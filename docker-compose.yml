# Epic Agent Fabric - Beginner Friendly Docker Compose
# This is a simplified version that works for first-time Docker users.
# Only services with real, publicly available images are enabled.

services:
  # === Core Service: Redis (used by TokenOS) ===
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # === Future Services (commented out until images are ready) ===
