# Epic Agent Fabric - Working Core Services
# This version is designed to work for first-time Docker users.

services:
  # Redis - Database for TokenOS
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Executor Gateway - The secure bridge for agents
  executor-gateway:
    build:
      context: ./integrations/executor-gateway
    ports:
      - "8787:8787"
    restart: unless-stopped

  # TokenOS - Usage tracking and economics
  tokenos:
    build:
      context: ./integrations/tokenos
    ports:
      - "7777:7777"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
