# Epic Agent Fabric - Core Only (Production Ready)

services:
  # Redis - Database
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Executor Gateway - Secure agent bridge
  executor-gateway:
    build:
      context: ./integrations/executor-gateway
    ports:
      - "8787:8787"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STRIPE_API_KEY=${STRIPE_API_KEY:-}
      - ZAPIER_API_KEY=${ZAPIER_API_KEY:-}
    restart: unless-stopped

  # TokenOS - Usage & Economics
  tokenos:
    build:
      context: ./integrations/tokenos
    ports:
      - "7777:7777"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STRIPE_API_KEY=${STRIPE_API_KEY:-}
      - ZAPIER_API_KEY=${ZAPIER_API_KEY:-}
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
