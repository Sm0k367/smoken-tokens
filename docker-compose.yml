# Epic Agent Fabric - Full Production Stack (Python + Core)

services:
  # === CORE SERVICES ===
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  executor-gateway:
    build:
      context: ./integrations/executor-gateway
    ports:
      - "8787:8787"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STRIPE_API_KEY=${STRIPE_API_KEY:-}
      - ZAPIER_API_KEY=${ZAPIER_API_KEY:-}
    restart: unless-stopped

  tokenos:
    build:
      context: ./integrations/tokenos
    ports:
      - "7777:7777"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STRIPE_API_KEY=${STRIPE_API_KEY:-}
      - ZAPIER_API_KEY=${ZAPIER_API_KEY:-}
    depends_on:
      - redis
    restart: unless-stopped

  # === AUTOMATION ===
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

  # === MEMORY ===
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  # === PYTHON MICROSERVICES ===
  memory-manager:
    build:
      context: ./python-services/memory-manager
    ports:
      - "8100:8100"
    depends_on:
      - chroma
    restart: unless-stopped

  llm-gateway:
    build:
      context: ./python-services/llm-gateway
    ports:
      - "8200:8200"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped

  tool-registry:
    build:
      context: ./python-services/tool-registry
    ports:
      - "8300:8300"
    depends_on:
      - executor-gateway
    restart: unless-stopped

  agent-runner:
    build:
      context: ./python-services/agent-runner
    ports:
      - "8400:8400"
    depends_on:
      - memory-manager
      - llm-gateway
      - tool-registry
    restart: unless-stopped

volumes:
  redis_data:
  n8n_data:
  chroma_data:
