# Epic Agent Fabric - Full Stack (Beginner Friendly)
# This file includes all 5 pillars. Only services with real images are enabled.

services:
  # === CORE (Always Working) ===
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  executor-gateway:
    build:
      context: ./integrations/executor-gateway
    ports:
      - "8787:8787"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STRIPE_API_KEY=${STRIPE_API_KEY:-}
      - ZAPIER_API_KEY=${ZAPIER_API_KEY:-}
    restart: unless-stopped

  tokenos:
    build:
      context: ./integrations/tokenos
    ports:
      - "7777:7777"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STRIPE_API_KEY=${STRIPE_API_KEY:-}
      - ZAPIER_API_KEY=${ZAPIER_API_KEY:-}
    depends_on:
      - redis
    restart: unless-stopped

  # === MEDIA FABRIC ===
  voicebox:
    image: ghcr.io/voicebox-ai/voicebox:latest
    ports:
      - "5001:5001"
    restart: unless-stopped

  fluidvoice:
    image: ghcr.io/fluidvoice/fluidvoice:latest
    ports:
      - "5002:5002"
    restart: unless-stopped

  penpot:
    image: penpotapp/penpot:latest
    ports:
      - "9001:80"
    restart: unless-stopped

  # === AGENT OS LAYER ===
  # Note: Codebase Memory MCP, Zapier MCP, and Agent Reach
  # are currently integrated via the Executor Gateway

  # === INTELLIGENCE FABRIC ===
  # Note: TimesFM, Daily Stock Analysis, World Monitor
  # are currently research/tools - not yet containerized

  # === PROMPT LAYER ===
  # Note: System Prompt Leaks is research-only for now

volumes:
  redis_data:
