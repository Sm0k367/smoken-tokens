# Epic Agent Fabric - Full Production Stack
# This version includes Core + Media/Voice + Automation + Memory

services:
  # === CORE ===
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  executor-gateway:
    build:
      context: ./integrations/executor-gateway
    ports:
      - "8787:8787"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STRIPE_API_KEY=${STRIPE_API_KEY:-}
      - ZAPIER_API_KEY=${ZAPIER_API_KEY:-}
    restart: unless-stopped

  tokenos:
    build:
      context: ./integrations/tokenos
    ports:
      - "7777:7777"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STRIPE_API_KEY=${STRIPE_API_KEY:-}
      - ZAPIER_API_KEY=${ZAPIER_API_KEY:-}
    depends_on:
      - redis
    restart: unless-stopped

  # === MEDIA & VOICE ===
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=base
    restart: unless-stopped

  piper:
    image: lscr.io/linuxserver/piper:latest
    ports:
      - "5003:5003"
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./volume/piper:/config
    restart: unless-stopped

  # === AUTOMATION ===
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

  # === MEMORY ===
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  # === LOCAL LLM (for agents + coding) ===
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  redis_data:
  n8n_data:
  chroma_data:
  ollama_data:
